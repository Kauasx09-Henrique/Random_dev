<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Gatinhos Aleatórios 🐱</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #f5f5f5, #e0e0e0);
            font-family: Arial, sans-serif;
        }

        .container {
            text-align: center;
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        }

        h1 {
            margin-bottom: 20px;
        }

        img {
            max-width: 350px;
            border-radius: 12px;
            margin-top: 10px;
        }

        button {
            margin-top: 20px;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background-color: #ff9800;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: #e68900;
        }

        #loading {
            margin-top: 10px;
            color: #555;
        }

        #error {
            margin-top: 10px;
            color: red;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>🐱 Gatinho do Dia</h1>

        <img id="catImage" src="" alt="Gatinho fofo" />

        <p id="loading"></p>
        <p id="error"></p>

        <button onclick="loadCat()">Novo Gatinho 🐾</button>
    </div>

    <script>
        async function loadCat() {
            try {
                const response = await fetch("https://cataas.com/cat?json=true");
                const data = await response.json();

                const imageUrl = data.url.startsWith("http")
                    ? data.url
                    : "https://cataas.com" + data.url;

                document.getElementById("catImage").src = imageUrl;

            } catch (err) {
                console.error(err);
                document.getElementById("error").innerText =
                    "Erro ao carregar gatinho 😿";
            }
        }
    </script>

</body>

</html>
